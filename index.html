<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Chechi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {margin: 0; padding: 0; background: #000000; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden;}
       .container {text-align: center; z-index: 2; position: relative;}
        #startBtn {background: #8d4dff; color: white; border: none; padding: 15px 40px; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(141, 77, 255, 0.4);}
       .hidden {display: none;}
       .photo-box {width: 200px; height: 280px; margin: 0 auto 20px; position: relative; border-radius: 20px; overflow: hidden; border: 4px solid #8d4dff; background: #1a1a1a;}
       .photo {width: 100%; height: 100%; object-fit: cover; object-position: center;}
        h1 {color: #fff; font-size: 28px; margin: 20px 0 10px;}
       .name {color: #e0d6ff; font-size: 32px; font-weight: bold; margin-bottom: 20px;}
       .cake-img {width: 150px; margin-top: 10px;}
        #hearts, #crackers {position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;}
       .heart {position: absolute; font-size: 20px; animation: floatUp 4s linear forwards; opacity: 0.8;}
        @keyframes floatUp {0% {transform: translateY(100vh) scale(0); opacity: 1;} 100% {transform: translateY(-10vh) scale(1); opacity: 0;}}
       .cracker {position: absolute; width: 4px; height: 4px; border-radius: 50%; animation: blast 1s ease-out forwards;}
        @keyframes blast {0% { transform: scale(0); opacity: 1; } 100% { transform: scale(30); opacity: 0; }}
    </style>
</head>
<body>
    <div id="hearts"></div>
    <div id="crackers"></div>
    <div class="container">
        <button id="startBtn">Happy Birthday 🎉</button>
        <div id="mainContent" class="hidden">
            <div class="photo-box">
                <img src="alisha.jpg" alt="Chechi" class="photo">
            </div>
            <h1>Happy birthday dear chechi</h1>
            <div class="name">ALISHA JOSEPH</div>
            <img src="https://png.pngtree.com/png-vector/20230304/ourmid/pngtree-birthday-cake-png-image_6627878.png" alt="Cake" class="cake-img">
        </div>
    </div>
    <script>
        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('mainContent').classList.remove('hidden');
            setInterval(() => {let heart = document.createElement('div'); heart.className = 'heart'; heart.innerHTML = Math.random() > 0.5? '💜' : '💙'; heart.style.left = Math.random() * 100 + 'vw'; heart.style.fontSize = Math.random() * 20 + 15 + 'px'; document.getElementById('hearts').appendChild(heart); setTimeout(() => heart.remove(), 4000);}, 300);
            setInterval(() => {let cracker = document.createElement('div'); cracker.className = 'cracker'; cracker.style.left = Math.random() * 100 + 'vw'; cracker.style.top = Math.random() * 100 + 'vh'; cracker.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`; document.getElementById('crackers').appendChild(cracker); setTimeout(() => cracker.remove(), 1000);}, 500);
        });
    </script>
</body>
</html>
